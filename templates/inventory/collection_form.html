{% extends "base.html" %}

{% block title %}{% if object %}Edit{% else %}Add{% endif %} Collection - Interior Soft{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">{% if object %}Edit Collection: {{ object.name }}{% else %}Add New Collection{% endif %}</h1>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_name" class="form-label">Collection Name</label>
                        <input type="text" name="name" id="id_name" class="form-control" value="{{ object.name|default:'' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_description" class="form-label">Description (Optional)</label>
                        <textarea name="description" id="id_description" class="form-control" rows="3">{{ object.description|default:'' }}</textarea>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Save Collection</button>
                        <a href="{% url 'collection_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
