{% extends "base.html" %}

{% block title %}{% if object %}Edit{% else %}Add{% endif %} Design Type - Interior Soft{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">{% if object %}Edit Design: {{ object.name }}{% else %}Add New Design{% endif %}</h1>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_collection" class="form-label">Collection</label>
                        <select name="collection" id="id_collection" class="form-select" required>
                            <option value="">Select collection...</option>
                            {% for col in collections %}
                                <option value="{{ col.id }}" {% if object.collection.id == col.id %}selected{% endif %}>{{ col.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="id_name" class="form-label">Design Name / Sr No</label>
                        <input type="text" name="name" id="id_name" class="form-control" value="{{ object.name|default:'' }}" required>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-4 mb-3">
                            <label for="id_alias1" class="form-label">Alias 1</label>
                            <input type="text" name="alias1" id="id_alias1" class="form-control" value="{{ object.alias1|default:'' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="id_alias2" class="form-label">Alias 2</label>
                            <input type="text" name="alias2" id="id_alias2" class="form-control" value="{{ object.alias2|default:'' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="id_alias3" class="form-label">Alias 3</label>
                            <input type="text" name="alias3" id="id_alias3" class="form-control" value="{{ object.alias3|default:'' }}">
                        </div>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6 mb-3">
                            <label for="id_alias4" class="form-label">Alias 4</label>
                            <input type="text" name="alias4" id="id_alias4" class="form-control" value="{{ object.alias4|default:'' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="id_alias5" class="form-label">Alias 5</label>
                            <input type="text" name="alias5" id="id_alias5" class="form-control" value="{{ object.alias5|default:'' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="id_description" class="form-label">Description (Optional)</label>
                        <textarea name="description" id="id_description" class="form-control" rows="2">{{ object.description|default:'' }}</textarea>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6 mb-3">
                            <label for="id_unit" class="form-label">Unit</label>
                            <input type="text" name="unit" id="id_unit" class="form-control" value="{{ object.unit|default:'meters' }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="id_default_price" class="form-label">Default Price (₹)</label>
                            <input type="number" name="default_price" id="id_default_price" class="form-control" step="0.01" value="{{ object.default_price|default:'0.00' }}">
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Save Design</button>
                        <a href="{% url 'stock_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
