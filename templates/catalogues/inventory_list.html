{% extends "base.html" %}

{% block title %}Catalogue Inventory - Interior Soft{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Catalogue Inventory</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <a href="{% url 'catalogue_purchase_list' %}" class="btn btn-sm btn-outline-info me-2">
            <i class="bi bi-journal-text"></i> Purchase History
        </a>
        <a href="{% url 'catalogue_purchase_create' %}" class="btn btn-sm btn-outline-primary me-2">
            <i class="bi bi-cart-plus"></i> Purchase Stock
        </a>
        <a href="{% url 'catalogue_distribution_create' %}" class="btn btn-sm btn-primary">
            <i class="bi bi-share"></i> Distribute
        </a>
    </div>
</div>

<div class="row">
    <div class="col-md-12">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form method="get" class="row g-2 align-items-center" onsubmit="return false;">
                    <div class="col-md-12">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                            <input type="text" name="q" class="form-control border-start-0" placeholder="Type to search catalogue types..." value="{{ request.GET.q }}" autofocus>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0">Available Stock</h5>
            </div>
            <div class="card-body p-0" id="inventory-table-container">
                {% include "catalogues/inventory_list_partial.html" %}
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.querySelector('input[name="q"]');
        const container = document.getElementById('inventory-table-container');

        let timeout = null;
        searchInput.addEventListener('input', function() {
            clearTimeout(timeout);
            timeout = setTimeout(function() {
                const query = searchInput.value;
                const url = new URL(window.location.href);
                url.searchParams.set('q', query);

                fetch(url, {
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                })
                .then(response => response.text())
                .then(html => {
                    container.innerHTML = html;
                    // Update URL without reload
                    window.history.pushState({}, '', url);
                });
            }, 300); // Debounce
        });
    });
</script>
{% endblock %}
