<div class="table-responsive">
    <table class="table table-hover mb-0">
        <thead class="table-light">
            <tr>
                <th>Catalogue Type</th>
                <th>Quantity Available</th>
                <th>Last Updated</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for item in inventory %}
            <tr>
                <td class="fw-bold">{{ item.catalogue_type.name }}</td>
                <td>
                    <span class="fs-5 {% if item.quantity < 5 %}text-danger{% else %}text-success{% endif %}">
                        {{ item.quantity }}
                    </span>
                </td>
                <td>{{ item.last_updated|date:"d M Y, h:i A" }}</td>
                <td>
                    <a href="{% url 'catalogue_distribution_create' %}" class="btn btn-sm btn-outline-primary">Distribute</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center py-3">No inventory records found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
