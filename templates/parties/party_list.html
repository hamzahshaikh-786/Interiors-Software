{% extends "base.html" %}

{% block title %}Parties - Interior Soft{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Parties (Clients)</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <a href="{% url 'party_import' %}" class="btn btn-sm btn-outline-secondary me-2">
            <i class="bi bi-file-earmark-arrow-up"></i> Bulk Import
        </a>
        <a href="{% url 'party_add' %}" class="btn btn-sm btn-primary">
            <i class="bi bi-plus"></i> Add New Party
        </a>
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-header bg-white">
        <form class="row g-2 align-items-center" onsubmit="return false;">
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                    <input type="text" name="q" class="form-control border-start-0" placeholder="Search by name or phone..." value="{{ request.GET.q }}" autofocus>
                </div>
            </div>
        </form>
    </div>
    <div class="card-body p-0" id="party-table-container">
        {% include "parties/party_list_partial.html" %}
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.querySelector('input[name="q"]');
        const container = document.getElementById('party-table-container');

        let timeout = null;
        searchInput.addEventListener('input', function() {
            clearTimeout(timeout);
            timeout = setTimeout(function() {
                const query = searchInput.value;
                const url = new URL(window.location.href);
                url.searchParams.set('q', query);

                fetch(url, {
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                })
                .then(response => response.text())
                .then(html => {
                    container.innerHTML = html;
                    // Update URL without reload
                    window.history.pushState({}, '', url);
                });
            }, 300); // Debounce
        });
    });
</script>
{% endblock %}
