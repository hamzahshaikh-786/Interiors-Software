name: 🚀 Deploy Bluebells

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/apps/bluebells/project/Interiors-Software
            git pull origin main
            /root/apps/bluebells/project/Interiors-Software/venv/bin/pip install -r requirements.txt
            /root/apps/bluebells/project/Interiors-Software/venv/bin/python manage.py migrate
            /root/apps/bluebells/project/Interiors-Software/venv/bin/python manage.py collectstatic --noinput
            sudo systemctl restart bluebells
